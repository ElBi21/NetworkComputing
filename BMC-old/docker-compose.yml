services:
  exp_server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: netcomp_server
    stdin_open: true
    tty: true
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    networks:
      internal_net:
        ipv4_address: 10.0.1.2
      external_net:
        ipv4_address: 10.0.2.2
    ports:
      - "9010:8080"  # Expose to external network
    environment:
      - SERVER_PORT=8080
    command: /bin/bash

  exp_client_1:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: netcomp_client_1
    stdin_open: true
    tty: true
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    networks:
      internal_net:
        ipv4_address: 10.0.1.3
      external_net:
        ipv4_address: 10.0.2.3
    ports:
      - "9011:8080"
    environment:
      - CLIENT_ID=1
    depends_on:
      - exp_server
    command: /bin/bash

  exp_client_2:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: netcomp_client_2
    stdin_open: true
    tty: true
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    networks:
      internal_net:
        ipv4_address: 10.0.1.4
      external_net:
        ipv4_address: 10.0.2.4
    ports:
      - "9012:8080"
    environment:
      - CLIENT_ID=2
    depends_on:
      - exp_server
    command: /bin/bash

networks:
  internal_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.1.0/24
    driver_opts:
      com.docker.network.bridge.name: br-internal

  external_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.2.0/24
    driver_opts:
      com.docker.network.bridge.name: br-external